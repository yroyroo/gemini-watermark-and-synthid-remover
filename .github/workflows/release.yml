name: Build & Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

env:
  BUILD_TYPE: Release
  # secrets.* is not allowed in step `if:` conditions, so expose the cert's
  # presence as a plain 'true'/'false' string and gate steps on env.HAS_CERT.
  HAS_CERT: ${{ secrets.MACOS_CERTIFICATE != '' }}

jobs:
  # Single full-package build per (OS, arch). Every release binary ships the
  # FDnCNN AI denoise (NCNN+Vulkan) + MI-GAN (ONNX Runtime, the default
  # NotebookLM intricate-scene inpainter), no lean/full split, no FSR/LaMa.
  # Vulkan + MI-GAN handling:
  #   - macOS arm64: native + Vulkan_LIBRARY hard-link; bundles the Vulkan loader
  #     + MoltenVK (out-of-the-box GPU) + libonnxruntime + the 27MB MI-GAN model.
  #   - macOS x86_64: cross-compiled on the arm64 runner (the only Intel runner,
  #     macos-13, was retired). WMR_NCNN_VULKAN=OFF -> CPU-only AI (NCNN's
  #     simplevk does static Vulkan linkage on APPLE, needs a build-time
  #     libvulkan; no x86_64 Vulkan dylib on this arm64 runner). MI-GAN is also
  #     OFF here (ORT dropped osx-x86_64 prebuilts after v1.23.0) -> NS fallback.
  #     arm64 keeps the GPU + MI-GAN build.
  #   - Linux/Windows: no Vulkan at build time (NCNN simplevk dlopens
  #     libvulkan.so.1 / vulkan-1.dll at runtime); graceful CPU fallback. MI-GAN
  #     ON (ORT prebuilt fetched at configure) -> the package is an archive
  #     (wmr + libonnxruntime.so.1 / onnxruntime.dll + migan_pipeline_v2.onnx).
  # The GPU path can't run on the runners' paravirtualized Metal / headless GPUs,
  # so every smoke forces CPU (VK_ICD_FILENAMES=/nonexistent) and still proves
  # the binary launches + denoises + tears down cleanly.
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: wmr-windows-x86_64
            binary: build/wmr.exe
            vcpkg_triplet: x64-windows-static
            enable_migan: true

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive          # NCNN submodule (in-tree Vulkan build)
          # macOS ships the CoreML .mlpackage (14MB, LFS); Linux/Windows ship the ORT .onnx (27MB).
          lfs: ${{ matrix.enable_migan }}

      - name: Install Rosetta (macOS x86_64 cross-build)
        # Cross-compiling for x64-osx on an arm64 runner builds x86_64 host tools
        # during the vcpkg/NCNN build that must execute via Rosetta.
        if: runner.os == 'macOS' && matrix.macos_arch == 'x86_64'
        run: softwareupdate --install-rosetta --agree-to-license || true

      - name: Install macOS build deps (nasm)
        # x264 (an ffmpeg[x264] dep) builds from source on a cold triplet and
        # needs nasm. The x64-osx triplet is new -> its cache is cold the first
        # run, so x264 must build -> needs nasm. (arm64-osx is usually warm, but
        # install defensively in case the cache evicts.) nasm's output arch is
        # set by flags (-f macho64), not the nasm binary's own arch, so the
        # Homebrew arm64 nasm assembles x86_64 code for the cross-build fine.
        if: runner.os == 'macOS'
        run: brew install nasm

      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build pkg-config nasm yasm patchelf

      - name: Install macOS Vulkan loader + MoltenVK (arm64 bundle only)
        # arm64 bundles MoltenVK for out-of-the-box GPU. x86_64 uses simplevk
        # (no bundle) so it needs no Vulkan libs at build time.
        if: runner.os == 'macOS' && matrix.macos_arch == 'arm64'
        run: brew install vulkan-loader molten-vk

      - uses: lukka/run-vcpkg@v11
        with:
          runVcpkgInstall: true
          vcpkgJsonGlob: '**/vcpkg.json'

      - name: Configure (macOS)
        if: runner.os == 'macOS'
        run: |
          ARGS="-DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} -DWMR_BUILD_TESTS=OFF -DWMR_BUILD_AI_DENOISE=ON -DWMR_BUILD_AI_MIGAN=${{ matrix.enable_migan }} -DVCPKG_MANIFEST_FEATURES=ai-denoise -DVCPKG_TARGET_TRIPLET=${{ matrix.vcpkg_triplet }} -DCMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake"
          if [ "${{ matrix.macos_arch }}" = "x86_64" ]; then
            # Cross-compile Intel on Apple Silicon. NCNN's simplevk does STATIC
            # Vulkan linkage on APPLE and needs a build-time libvulkan; there is
            # no x86_64 Vulkan dylib on this arm64 runner, so disable Vulkan
            # entirely -> CPU-only AI on this binary. MI-GAN is OFF here too (no
            # osx-x86_64 ORT prebuilt); arm64 keeps the GPU + MI-GAN build.
            ARGS="$ARGS -DCMAKE_OSX_ARCHITECTURES=x86_64 -DWMR_NCNN_VULKAN=OFF"
          else
            # Apple Silicon native + bundled MoltenVK for out-of-the-box GPU.
            ARGS="$ARGS -DVulkan_LIBRARY=$(brew --prefix vulkan-loader)/lib/libvulkan.dylib"
          fi
          cmake -B build -S . -GNinja $ARGS

      - name: Configure (Linux)
        if: runner.os == 'Linux'
        run: |
          cmake -B build -S . -GNinja \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DWMR_BUILD_TESTS=OFF \
            -DWMR_BUILD_AI_DENOISE=ON \
            -DWMR_BUILD_AI_MIGAN=ON \
            -DVCPKG_MANIFEST_FEATURES="ai-denoise" \
            -DVCPKG_TARGET_TRIPLET=${{ matrix.vcpkg_triplet }} \
            -DCMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake

      - name: Configure + Build (Windows, MSVC)
        # The project cmake must use MSVC (cl.exe) to match the MSVC-built
        # vcpkg static deps. Without the VS dev env, cmake+Ninja detect MinGW
        # gcc from PATH -> the final link mixes a MinGW wmr.exe with MSVC object
        # files (x264 etc.) -> undefined __chkstk / __isa_available / fprintf.
        # Activate the MSVC env via vswhere (version-independent), then run both
        # configure and build under MSVC in this single cmd step.
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          set "VSWHERE=%ProgramFiles(x86)%\Microsoft Visual Studio\Installer\vswhere.exe"
          for /f "usebackq tokens=*" %%i in (`"%VSWHERE%" -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath`) do set "VSINSTALL=%%i"
          call "%VSINSTALL%\VC\Auxiliary\Build\vcvarsall.bat" x64
          cd /d "${{ github.workspace }}"
          cmake -B build -S . -GNinja ^
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} ^
            -DWMR_BUILD_TESTS=OFF ^
            -DWMR_BUILD_AI_DENOISE=ON ^
            -DWMR_BUILD_AI_MIGAN=ON ^
            -DVCPKG_MANIFEST_FEATURES="ai-denoise" ^
            -DVCPKG_TARGET_TRIPLET=${{ matrix.vcpkg_triplet }} ^
            -DCMAKE_TOOLCHAIN_FILE="${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake"
          cmake --build build --config ${{ env.BUILD_TYPE }}

      - name: Build
        if: runner.os != 'Windows'
        run: cmake --build build --config ${{ env.BUILD_TYPE }}

      - name: AI denoise smoke (CPU path + clean teardown)
        # Forces no ICD so NCNN falls back to CPU (runners' GPUs can't run
        # Vulkan/MoltenVK). Still proves the binary launches, denoises, and exits
        # without the ncnn static-singleton EXC_BAD_ACCESS-at-exit regression.
        # (x86_64 macOS binary runs on the arm64 host via Rosetta.) With MI-GAN ON
        # the binary also pulls in libonnxruntime (resolved via rpath/dll-co-loc),
        # proving the ORT load path is sound.
        shell: bash
        run: |
          export VK_ICD_FILENAMES=/nonexistent
          ${{ matrix.binary }} remove test-images/2400x1792-test1-gemini.png --denoise ai -o smoke_out.png
          test -f smoke_out.png

      - name: Import code-signing certificate
        # Imports the Developer ID Application cert (from secrets) into an
        # ephemeral keychain so the packaging steps can sign + notarize. Gated
        # at the step level: if the secret is absent the step is skipped and the
        # unsigned-fallback packaging steps run instead. The secret value never
        # flows into an env var used for gating (only into the import below).
        if: runner.os == 'macOS' && env.HAS_CERT == 'true'
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          KC="wmr-build.keychain-db"
          PP="$(uuidgen)"                       # random keychain password (macOS has uuidgen)
          echo "::add-mask::$PP"
          echo "::add-mask::$MACOS_CERTIFICATE_PASSWORD"
          # macOS base64 decode flag is -D (BSD), NOT --decode (GNU).
          printf '%s' "$MACOS_CERTIFICATE" | base64 -D > /tmp/cert.p12
          chmod 600 /tmp/cert.p12
          security create-keychain -p "$PP" "$KC"
          security set-keychain-settings -lut 21600 "$KC"
          security unlock-keychain -p "$PP" "$KC"
          # -T adds trusted apps (no blanket -A). codesign signs; security reads for notarytool.
          security import /tmp/cert.p12 -P "$MACOS_CERTIFICATE_PASSWORD" \
              -t cert -f pkcs12 -k "$KC" \
              -T /usr/bin/codesign -T /usr/bin/security
          rm -f /tmp/cert.p12
          # Prepend the temp keychain to the user search list so find-identity/codesign
          # find the cert FIRST. Capture the existing list into an array (quoted),
          # build the new list, set it as ONE argument.
          OLD_KCS=()
          while IFS= read -r line; do
              [ -n "$line" ] && OLD_KCS+=("${line//\"/}")
          done < <(security list-keychains -d user)
          security list-keychains -d user -s "$KC" "${OLD_KCS[@]}"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$PP" "$KC"

      - name: Package + sign + notarize (macOS arm64)
        if: runner.os == 'macOS' && matrix.macos_arch == 'arm64' && env.HAS_CERT == 'true'
        env:
          AC_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          AC_API_KEY_ISSUER: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          AC_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
        run: |
          set -euo pipefail
          mkdir -p dist staging/wmr-macos-arm64
          ./scripts/bundle_macos_vulkan.sh build/wmr staging/wmr-macos-arm64
          cp -R assets/migan_512_places2_fp16.mlpackage staging/wmr-macos-arm64/
          ./scripts/sign_and_notarize_macos.sh staging/wmr-macos-arm64 dist/wmr-macos-arm64.zip

      - name: Package (macOS arm64, unsigned fallback)
        if: runner.os == 'macOS' && matrix.macos_arch == 'arm64' && env.HAS_CERT == 'false'
        run: |
          mkdir -p dist staging/wmr-macos-arm64
          ./scripts/bundle_macos_vulkan.sh build/wmr staging/wmr-macos-arm64
          cp -R assets/migan_512_places2_fp16.mlpackage staging/wmr-macos-arm64/
          ditto -c -k --keepParent staging/wmr-macos-arm64 dist/wmr-macos-arm64.zip

      - name: Package + sign + notarize (macOS x86_64)
        if: runner.os == 'macOS' && matrix.macos_arch == 'x86_64' && env.HAS_CERT == 'true'
        env:
          AC_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          AC_API_KEY_ISSUER: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          AC_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
        run: |
          set -euo pipefail
          mkdir -p dist staging/wmr-macos-x86_64
          cp build/wmr staging/wmr-macos-x86_64/wmr
          chmod +x staging/wmr-macos-x86_64/wmr
          cp -R assets/migan_512_places2_fp16.mlpackage staging/wmr-macos-x86_64/
          ./scripts/sign_and_notarize_macos.sh staging/wmr-macos-x86_64 dist/wmr-macos-x86_64.zip

      - name: Package (macOS x86_64, unsigned fallback)
        if: runner.os == 'macOS' && matrix.macos_arch == 'x86_64' && env.HAS_CERT == 'false'
        run: |
          mkdir -p dist staging/wmr-macos-x86_64
          cp build/wmr staging/wmr-macos-x86_64/wmr
          chmod +x staging/wmr-macos-x86_64/wmr
          cp -R assets/migan_512_places2_fp16.mlpackage staging/wmr-macos-x86_64/
          ditto -c -k --keepParent staging/wmr-macos-x86_64 dist/wmr-macos-x86_64.zip

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p dist/wmr-linux-x86_64
          cp build/wmr dist/wmr-linux-x86_64/wmr
          chmod +x dist/wmr-linux-x86_64/wmr
          # MI-GAN: co-locate libonnxruntime.so.1 (+ the versioned real file) and
          # the model; set rpath=$ORIGIN so the binary finds the lib next to it.
          cp -P build/onnxruntime-linux-x64-*/lib/libonnxruntime.so.1* dist/wmr-linux-x86_64/
          patchelf --set-rpath '$ORIGIN' dist/wmr-linux-x86_64/wmr
          cp assets/migan_pipeline_v2.onnx dist/wmr-linux-x86_64/
          tar -czf dist/${{ matrix.artifact }}.tar.gz -C dist wmr-linux-x86_64

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist\wmr-windows-x86_64 | Out-Null
          Copy-Item build\wmr.exe dist\wmr-windows-x86_64\
          # MI-GAN: co-locate onnxruntime.dll (+ providers_shared) and the model.
          Copy-Item build\onnxruntime-win-x64-*\lib\onnxruntime.dll dist\wmr-windows-x86_64\
          Copy-Item build\onnxruntime-win-x64-*\lib\onnxruntime_providers_shared.dll dist\wmr-windows-x86_64\
          Copy-Item assets\migan_pipeline_v2.onnx dist\wmr-windows-x86_64\
          Compress-Archive -Path dist\wmr-windows-x86_64 -DestinationPath dist\${{ matrix.artifact }}.zip

      - name: Verify packaged macOS arm64 artifact runs (CPU path)
        if: runner.os == 'macOS' && matrix.macos_arch == 'arm64'
        run: |
          set -euo pipefail
          mkdir -p /tmp/verify
          ditto -x -k dist/wmr-macos-arm64.zip /tmp/verify/
          ROOT=/tmp/verify/wmr-macos-arm64
          VK_ICD_FILENAMES=/nonexistent "$ROOT/wmr" remove test-images/2400x1792-test1-gemini.png --denoise ai -o /tmp/verify_out.png
          # assert native CoreML (no ORT) + the .mlpackage shipped.
          otool -L "$ROOT/wmr.bin" | grep -i CoreML
          if otool -L "$ROOT/wmr.bin" | grep -qi onnxruntime; then
            echo "fail: onnxruntime is linked (mac build must be CoreML-only)"
            exit 1
          fi
          test -d "$ROOT/migan_512_places2_fp16.mlpackage"
          "$ROOT/wmr" video --help > /tmp/vhelp.txt 2>&1 || true
          grep -q -- "--notebooklm-method" /tmp/vhelp.txt
          if [ "$HAS_CERT" = "true" ]; then
            codesign --verify --strict --verbose=2 "$ROOT/wmr.bin"
            codesign -dvvvv "$ROOT/wmr.bin" 2>&1 | grep -q "Authority=Developer ID Application"
            if [ -d "$ROOT/lib" ]; then
              find "$ROOT/lib" -type f -name '*.dylib' -exec codesign --verify --strict {} \;
            fi
          fi

      - name: Verify packaged macOS x86_64 artifact runs (CPU path)
        if: runner.os == 'macOS' && matrix.macos_arch == 'x86_64'
        run: |
          set -euo pipefail
          mkdir -p /tmp/verify-x86
          ditto -x -k dist/wmr-macos-x86_64.zip /tmp/verify-x86/
          ROOT=/tmp/verify-x86/wmr-macos-x86_64
          # x86_64 binary runs on the arm64 host via Rosetta. CoreML MI-GAN present.
          VK_ICD_FILENAMES=/nonexistent "$ROOT/wmr" remove test-images/2400x1792-test1-gemini.png --denoise ai -o /tmp/verify_x86_out.png
          otool -L "$ROOT/wmr" | grep -i CoreML
          if otool -L "$ROOT/wmr" | grep -qi onnxruntime; then
            echo "fail: onnxruntime is linked (mac build must be CoreML-only)"
            exit 1
          fi
          test -d "$ROOT/migan_512_places2_fp16.mlpackage"
          "$ROOT/wmr" video --help > /tmp/vhelp.txt 2>&1 || true
          grep -q -- "--notebooklm-method" /tmp/vhelp.txt
          if [ "$HAS_CERT" = "true" ]; then
            codesign --verify --strict --verbose=2 "$ROOT/wmr"
            codesign -dvvvv "$ROOT/wmr" 2>&1 | grep -q "Authority=Developer ID Application"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/

  # Unit + integration tests WITH the AI denoise compiled in (the release
  # binaries now always ship AI, so this restores AI + routing test coverage that
  # the dev-default-OFF / release-TESTS-OFF gap previously dropped).
  tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Linux system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build pkg-config nasm yasm

      - uses: lukka/run-vcpkg@v11
        with:
          runVcpkgInstall: true
          vcpkgJsonGlob: '**/vcpkg.json'

      - name: Configure (tests + AI)
        run: |
          cmake -B build -S . -GNinja \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DWMR_BUILD_AI_DENOISE=ON \
            -DWMR_BUILD_TESTS=ON \
            -DVCPKG_MANIFEST_FEATURES="ai-denoise" \
            -DVCPKG_TARGET_TRIPLET=x64-linux \
            -DCMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake

      - name: Build
        run: cmake --build build --config ${{ env.BUILD_TYPE }}

      - name: Test
        working-directory: ${{ github.workspace }}
        run: ctest --test-dir build --output-on-failure

  release:
    needs: [build, tests]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write   # create release + attach assets (fixes "Resource not accessible by integration")

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/wmr-macos-arm64/wmr-macos-arm64.zip
            artifacts/wmr-macos-x86_64/wmr-macos-x86_64.zip
            artifacts/wmr-linux-x86_64/wmr-linux-x86_64.tar.gz
            artifacts/wmr-windows-x86_64/wmr-windows-x86_64.zip
            LICENSE-THIRD-PARTY.md
