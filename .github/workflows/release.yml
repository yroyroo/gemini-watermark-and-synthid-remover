name: Build & Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

env:
  BUILD_TYPE: Release

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            artifact: wmr-macos-arm64
          - os: macos-15
            artifact: wmr-macos-x86_64
          - os: ubuntu-latest
            artifact: wmr-linux-x86_64
          - os: windows-latest
            artifact: wmr-windows-x86_64.exe
            vcpkg_triplet: x64-windows-static

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build pkg-config nasm yasm

      - uses: lukka/run-vcpkg@v11
        with:
          runVcpkgInstall: true
          vcpkgJsonGlob: '**/vcpkg.json'

      - name: Configure (Unix)
        if: runner.os != 'Windows'
        run: |
          cmake -B build -S . -GNinja \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DWMR_BUILD_TESTS=OFF \
            -DCMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        run: |
          cmake -B build -S . `
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} `
            -DWMR_BUILD_TESTS=OFF `
            -DVCPKG_TARGET_TRIPLET=x64-windows-static `
            -DCMAKE_TOOLCHAIN_FILE="${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake"

      - name: Build
        run: cmake --build build --config ${{ env.BUILD_TYPE }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp build/wmr dist/${{ matrix.artifact }}
          chmod +x dist/${{ matrix.artifact }}

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          mkdir dist
          cp build/${{ env.BUILD_TYPE }}/wmr.exe dist/${{ matrix.artifact }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

  # Optional AI-denoise build: produces a separate macOS arm64 binary with the
  # FDnCNN NCNN/Vulkan denoiser compiled in. Mirrors upstream's verified AI
  # build chain (NCNN submodule + vcpkg ai-denoise feature for volk, NO Vulkan
  # SDK install). The 4-job `build` matrix above stays AI-free (R7): no
  # submodules, no WMR_BUILD_AI_DENOISE, no ai-denoise vcpkg feature.
  ai-denoise:
    runs-on: macos-14
    # Run on tag pushes (for releases) + manual dispatch (for testing the heavy
    # NCNN build off-cycle). Skipped on ordinary PR/branch pushes.
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive          # fetches the NCNN submodule

      - uses: lukka/run-vcpkg@v11
        with:
          runVcpkgInstall: true
          vcpkgJsonGlob: '**/vcpkg.json'

      - name: Configure (AI)
        run: |
          cmake -B build -S . -GNinja \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DWMR_BUILD_TESTS=OFF \
            -DWMR_BUILD_AI_DENOISE=ON \
            -DVCPKG_MANIFEST_FEATURES="ai-denoise" \
            -DCMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake

      - name: Build
        run: cmake --build build --config ${{ env.BUILD_TYPE }}

      - name: Smoke test (--version)
        run: ./build/wmr --version

      - name: Package
        run: |
          mkdir -p dist
          cp build/wmr dist/wmr-macos-arm64-ai
          chmod +x dist/wmr-macos-arm64-ai
          cp LICENSE-AI.md dist/           # licenses travel with the shipped binary

      - uses: actions/upload-artifact@v4
        with:
          name: wmr-macos-arm64-ai
          path: dist/

  release:
    needs: [build, ai-denoise]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write   # create release + attach assets (fixes "Resource not accessible by integration")

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/wmr-macos-arm64/wmr-macos-arm64
            artifacts/wmr-macos-x86_64/wmr-macos-x86_64
            artifacts/wmr-linux-x86_64/wmr-linux-x86_64
            artifacts/wmr-windows-x86_64.exe/wmr-windows-x86_64.exe
            artifacts/wmr-macos-arm64-ai/wmr-macos-arm64-ai
            artifacts/wmr-macos-arm64-ai/LICENSE-AI.md
