name: Build & Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

env:
  BUILD_TYPE: Release

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            artifact: wmr-macos-arm64
            cache-key: macos-arm64
          - os: macos-13
            artifact: wmr-macos-x86_64
            cache-key: macos-x86_64
          - os: ubuntu-latest
            artifact: wmr-linux-x86_64
            cache-key: linux-x86_64
          - os: windows-latest
            artifact: wmr-windows-x86_64.exe
            cache-key: windows-x86_64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: 'f9ffbaa46ad8e284b2b74919f7e0ba259564d424'

      - name: Configure (Unix)
        if: runner.os != 'Windows'
        run: |
          cmake -B build -S . -GNinja \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DWMR_BUILD_TESTS=OFF

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        run: |
          cmake -B build -S . `
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} `
            -DWMR_BUILD_TESTS=OFF

      - name: Build
        run: cmake --build build --config ${{ env.BUILD_TYPE }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp build/wmr dist/${{ matrix.artifact }}
          chmod +x dist/${{ matrix.artifact }}

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          mkdir dist
          cp build/${{ env.BUILD_TYPE }}/wmr.exe dist/${{ matrix.artifact }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/wmr-macos-arm64/wmr-macos-arm64
            artifacts/wmr-macos-x86_64/wmr-macos-x86_64
            artifacts/wmr-linux-x86_64/wmr-linux-x86_64
            artifacts/wmr-windows-x86_64.exe/wmr-windows-x86_64.exe
