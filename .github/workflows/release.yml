name: Build & Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

env:
  BUILD_TYPE: Release

jobs:
  # Single full-package build per (OS, arch). Every release binary ships the
  # FDnCNN AI denoise (NCNN+Vulkan) + FSR (opencv_contrib xphoto) — no lean/full
  # split, no separate AI tarball. Vulkan handling:
  #   - macOS arm64: native build + Vulkan_LIBRARY hard-link; bundles the Vulkan
  #     loader + MoltenVK so it runs on a clean macOS with out-of-the-box GPU.
  #   - macOS x86_64: cross-compiled on the arm64 runner (the only Intel runner,
  #     macos-13, was retired). No Vulkan_LIBRARY -> NCNN simplevk weak-stub (no
  #     libvulkan load command) -> self-contained single binary; AI runs on CPU
  #     (GPU available if the user installs the Vulkan SDK).
  #   - Linux/Windows: no Vulkan at build time (NCNN simplevk dlopens
  #     libvulkan.so.1 / vulkan-1.dll at runtime); graceful CPU fallback.
  # The GPU path can't run on the runners' paravirtualized Metal / headless GPUs,
  # so every smoke forces CPU (VK_ICD_FILENAMES=/nonexistent) and still proves
  # the binary launches + denoises + tears down cleanly.
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            artifact: wmr-macos-arm64
            binary: build/wmr
            macos_arch: arm64
            vcpkg_triplet: arm64-osx
          - os: macos-14
            artifact: wmr-macos-x86_64
            binary: build/wmr
            macos_arch: x86_64
            vcpkg_triplet: x64-osx
          - os: ubuntu-latest
            artifact: wmr-linux-x86_64
            binary: build/wmr
            vcpkg_triplet: x64-linux
          - os: windows-latest
            artifact: wmr-windows-x86_64.exe
            binary: build/Release/wmr.exe
            vcpkg_triplet: x64-windows-static

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive          # NCNN submodule (in-tree Vulkan build)

      - name: Install Rosetta (macOS x86_64 cross-build)
        # Cross-compiling for x64-osx on an arm64 runner builds x86_64 host tools
        # during the vcpkg/NCNN build that must execute via Rosetta.
        if: runner.os == 'macOS' && matrix.macos_arch == 'x86_64'
        run: softwareupdate --install-rosetta --agree-to-license || true

      - name: Install macOS build deps (nasm)
        # x264 (an ffmpeg[x264] dep) builds from source on a cold triplet and
        # needs nasm. The x64-osx triplet is new -> its cache is cold the first
        # run, so x264 must build -> needs nasm. (arm64-osx is usually warm, but
        # install defensively in case the cache evicts.) nasm's output arch is
        # set by flags (-f macho64), not the nasm binary's own arch, so the
        # Homebrew arm64 nasm assembles x86_64 code for the cross-build fine.
        if: runner.os == 'macOS'
        run: brew install nasm

      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build pkg-config nasm yasm

      - name: Install macOS Vulkan loader + MoltenVK (arm64 bundle only)
        # arm64 bundles MoltenVK for out-of-the-box GPU. x86_64 uses simplevk
        # (no bundle) so it needs no Vulkan libs at build time.
        if: runner.os == 'macOS' && matrix.macos_arch == 'arm64'
        run: brew install vulkan-loader molten-vk

      - uses: lukka/run-vcpkg@v11
        with:
          runVcpkgInstall: true
          vcpkgJsonGlob: '**/vcpkg.json'

      - name: Configure (macOS)
        if: runner.os == 'macOS'
        run: |
          ARGS="-DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} -DWMR_BUILD_TESTS=OFF -DWMR_BUILD_AI_DENOISE=ON -DVCPKG_MANIFEST_FEATURES=ai-denoise -DVCPKG_TARGET_TRIPLET=${{ matrix.vcpkg_triplet }} -DCMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake"
          if [ "${{ matrix.macos_arch }}" = "x86_64" ]; then
            # Cross-compile Intel on Apple Silicon; no Vulkan_LIBRARY -> simplevk
            # weak-stub -> self-contained binary (CPU AI; GPU via user Vulkan SDK).
            ARGS="$ARGS -DCMAKE_OSX_ARCHITECTURES=x86_64"
          else
            # Apple Silicon native + bundled MoltenVK for out-of-the-box GPU.
            ARGS="$ARGS -DVulkan_LIBRARY=$(brew --prefix vulkan-loader)/lib/libvulkan.dylib"
          fi
          cmake -B build -S . -GNinja $ARGS

      - name: Configure (Linux)
        if: runner.os == 'Linux'
        run: |
          cmake -B build -S . -GNinja \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DWMR_BUILD_TESTS=OFF \
            -DWMR_BUILD_AI_DENOISE=ON \
            -DVCPKG_MANIFEST_FEATURES="ai-denoise" \
            -DVCPKG_TARGET_TRIPLET=${{ matrix.vcpkg_triplet }} \
            -DCMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        run: |
          cmake -B build -S . -GNinja `
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} `
            -DWMR_BUILD_TESTS=OFF `
            -DWMR_BUILD_AI_DENOISE=ON `
            -DVCPKG_MANIFEST_FEATURES="ai-denoise" `
            -DVCPKG_TARGET_TRIPLET=${{ matrix.vcpkg_triplet }} `
            -DCMAKE_TOOLCHAIN_FILE="${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake"

      - name: Build
        run: cmake --build build --config ${{ env.BUILD_TYPE }}

      - name: AI denoise smoke (CPU path + clean teardown)
        # Forces no ICD so NCNN falls back to CPU (runners' GPUs can't run
        # Vulkan/MoltenVK). Still proves the binary launches, denoises, and exits
        # without the ncnn static-singleton EXC_BAD_ACCESS-at-exit regression.
        # (x86_64 macOS binary runs on the arm64 host via Rosetta.)
        shell: bash
        run: |
          export VK_ICD_FILENAMES=/nonexistent
          ${{ matrix.binary }} remove test-images/2400x1792-test1-gemini.png --denoise ai -o smoke_out.png
          test -f smoke_out.png

      - name: Package (macOS arm64 tarball)
        if: runner.os == 'macOS' && matrix.macos_arch == 'arm64'
        run: |
          mkdir -p dist
          ./scripts/bundle_macos_vulkan.sh build/wmr staging/wmr-macos-arm64
          tar -czf dist/${{ matrix.artifact }}.tar.gz -C staging wmr-macos-arm64

      - name: Package (macOS x86_64 binary)
        if: runner.os == 'macOS' && matrix.macos_arch == 'x86_64'
        run: |
          mkdir -p dist
          cp build/wmr dist/${{ matrix.artifact }}
          chmod +x dist/${{ matrix.artifact }}

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p dist
          cp build/wmr dist/${{ matrix.artifact }}
          chmod +x dist/${{ matrix.artifact }}

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          mkdir dist
          cp build/Release/wmr.exe dist/${{ matrix.artifact }}

      - name: Verify packaged macOS arm64 artifact runs (CPU path)
        if: runner.os == 'macOS' && matrix.macos_arch == 'arm64'
        run: |
          mkdir -p /tmp/verify && tar -xzf dist/${{ matrix.artifact }}.tar.gz -C /tmp/verify
          VK_ICD_FILENAMES=/nonexistent /tmp/verify/wmr-macos-arm64/wmr remove test-images/2400x1792-test1-gemini.png --denoise ai -o /tmp/verify_out.png

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/

  # Unit + integration tests WITH the AI denoise compiled in (the release
  # binaries now always ship AI, so this restores AI + routing test coverage that
  # the dev-default-OFF / release-TESTS-OFF gap previously dropped).
  tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Linux system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build pkg-config nasm yasm

      - uses: lukka/run-vcpkg@v11
        with:
          runVcpkgInstall: true
          vcpkgJsonGlob: '**/vcpkg.json'

      - name: Configure (tests + AI)
        run: |
          cmake -B build -S . -GNinja \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DWMR_BUILD_AI_DENOISE=ON \
            -DWMR_BUILD_TESTS=ON \
            -DVCPKG_MANIFEST_FEATURES="ai-denoise" \
            -DVCPKG_TARGET_TRIPLET=x64-linux \
            -DCMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake

      - name: Build
        run: cmake --build build --config ${{ env.BUILD_TYPE }}

      - name: Test
        working-directory: ${{ github.workspace }}
        run: ctest --test-dir build --output-on-failure

  release:
    needs: [build, tests]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write   # create release + attach assets (fixes "Resource not accessible by integration")

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/wmr-macos-arm64/wmr-macos-arm64.tar.gz
            artifacts/wmr-macos-x86_64/wmr-macos-x86_64
            artifacts/wmr-linux-x86_64/wmr-linux-x86_64
            artifacts/wmr-windows-x86_64.exe/wmr-windows-x86_64.exe
            LICENSE-THIRD-PARTY.md
