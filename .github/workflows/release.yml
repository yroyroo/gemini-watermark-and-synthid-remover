name: Build & Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

env:
  BUILD_TYPE: Release

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            artifact: wmr-macos-arm64
          - os: macos-15
            artifact: wmr-macos-x86_64
          - os: ubuntu-latest
            artifact: wmr-linux-x86_64
          - os: windows-latest
            artifact: wmr-windows-x86_64.exe
            vcpkg_triplet: x64-windows-static

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build pkg-config nasm yasm

      - uses: lukka/run-vcpkg@v11
        with:
          runVcpkgInstall: true
          vcpkgJsonGlob: '**/vcpkg.json'

      - name: Configure (Unix)
        if: runner.os != 'Windows'
        run: |
          cmake -B build -S . -GNinja \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DWMR_BUILD_TESTS=OFF \
            -DCMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        run: |
          cmake -B build -S . `
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} `
            -DWMR_BUILD_TESTS=OFF `
            -DVCPKG_TARGET_TRIPLET=x64-windows-static `
            -DCMAKE_TOOLCHAIN_FILE="${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake"

      - name: Build
        run: cmake --build build --config ${{ env.BUILD_TYPE }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp build/wmr dist/${{ matrix.artifact }}
          chmod +x dist/${{ matrix.artifact }}

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          mkdir dist
          cp build/${{ env.BUILD_TYPE }}/wmr.exe dist/${{ matrix.artifact }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

  # AI-denoise build: a separate macOS arm64 binary with the FDnCNN NCNN/Vulkan
  # denoiser compiled in. Mirrors upstream's AI build chain (NCNN submodule +
  # vcpkg ai-denoise feature for volk, NO Vulkan SDK install). The Vulkan
  # *loader* (libvulkan) + MoltenVK (libMoltenVK) are bundled next to the binary
  # (scripts/bundle_macos_vulkan.sh) with an @loader_path rpath + a launcher that
  # sets VK_ICD_FILENAMES, so the artifact runs on a clean macOS install — no
  # Vulkan SDK, Homebrew, or MoltenVK needed. The 4-job `build` matrix above
  # stays AI-free (R7): no submodules, no WMR_BUILD_AI_DENOISE, no ai-denoise
  # vcpkg feature. Runs on tag pushes (ships the AI tarball) + manual dispatch.
  ai-denoise:
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive          # fetches the NCNN submodule

      - uses: lukka/run-vcpkg@v11
        with:
          runVcpkgInstall: true
          vcpkgJsonGlob: '**/vcpkg.json'

      - name: Install Vulkan loader + MoltenVK
        # NCNN_VULKAN=ON LINKS libvulkan (the loader) at build time. That dylib
        # comes from the vulkan-loader formula — NOT molten-vk, which ships only
        # libMoltenVK (the Metal ICD the loader dlopens at runtime). Both are
        # bundled into the artifact post-build so it runs on a clean machine.
        run: brew install vulkan-loader molten-vk

      - name: Configure (AI)
        run: |
          VKLIB="$(brew --prefix vulkan-loader)/lib/libvulkan.dylib"
          cmake -B build -S . -GNinja \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DWMR_BUILD_TESTS=OFF \
            -DWMR_BUILD_AI_DENOISE=ON \
            -DVCPKG_MANIFEST_FEATURES="ai-denoise" \
            -DVulkan_LIBRARY="$VKLIB" \
            -DCMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake

      - name: Build
        run: cmake --build build --config ${{ env.BUILD_TYPE }}

      - name: Smoke test (--version)
        run: ./build/wmr --version

      - name: Denoise smoke (GPU path + clean teardown)
        # Exercises Vulkan GPU init and process-exit teardown. Guards against the
        # ncnn static-singleton destructor crash (EXC_BAD_ACCESS in
        # VulkanDevice::vkdevice() at exit) that previously segfaulted the GPU path.
        run: ./build/wmr remove test-images/2400x1792-test1-gemini.png --denoise ai -o /tmp/clean.png

      - name: Bundle Vulkan loader + MoltenVK into a standalone tarball
        run: |
          mkdir -p staging dist
          ./scripts/bundle_macos_vulkan.sh build/wmr staging/wmr-macos-arm64-ai
          tar -czf dist/wmr-macos-arm64-ai.tar.gz -C staging wmr-macos-arm64-ai
          cp LICENSE-AI.md dist/            # license travels with the shipped binary

      - name: Verify the bundled artifact runs end-to-end (CPU path)
        # Runs the EXTRACTED bundled artifact through the launcher. The runner's
        # paravirtualized Metal GPU (AppleParavirtDevice) lacks a selector MoltenVK
        # probes during vkCreateInstance (newArgumentEncoderWithLayout:), so the GPU
        # path throws an NSException and aborts here — real Apple Silicon runs it
        # fine (verified locally). We force no ICD (VK_ICD_FILENAMES -> nonexistent)
        # so the loader cleanly falls back to CPU: this still proves the bundle
        # launches (@rpath/@loader_path libvulkan resolution + signing + tarball
        # round-trip) and runs a denoise. The GPU path is verified out-of-band.
        run: |
          mkdir -p /tmp/verify && tar -xzf dist/wmr-macos-arm64-ai.tar.gz -C /tmp/verify
          VK_ICD_FILENAMES=/nonexistent /tmp/verify/wmr-macos-arm64-ai/wmr remove test-images/2400x1792-test1-gemini.png --denoise ai -o /tmp/clean-bundled.png

      - uses: actions/upload-artifact@v4
        with:
          name: wmr-macos-arm64-ai
          path: dist/

  release:
    needs: [build, ai-denoise]   # AI tarball ships with every release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write   # create release + attach assets (fixes "Resource not accessible by integration")

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/wmr-macos-arm64/wmr-macos-arm64
            artifacts/wmr-macos-x86_64/wmr-macos-x86_64
            artifacts/wmr-linux-x86_64/wmr-linux-x86_64
            artifacts/wmr-windows-x86_64.exe/wmr-windows-x86_64.exe
            artifacts/wmr-macos-arm64-ai/wmr-macos-arm64-ai.tar.gz
            artifacts/wmr-macos-arm64-ai/LICENSE-AI.md
